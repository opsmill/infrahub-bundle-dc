# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
---
version: "1.0"

nodes:
  - name: VirtualDevice
    namespace: Dcim
    description: Generic holding attributes and relationships relevant for virtual device.
    include_in_menu: false
    label: Virtual Device
    icon: mdi:server-network
    uniqueness_constraints:
      - [name__value]
    generate_template: true
    inherit_from:
      - CoreArtifactTarget
      - DcimGenericDevice
    attributes:
      - name: role
        kind: Dropdown
        optional: true
        order_weight: 1400
        choices:
          - name: core
            label: Core Router
            description: Central part of the network.
            color: "#7f7fff"
          - name: edge
            label: Edge Router
            description: Network boundary with external networks.
            color: "#bf7fbf"
          - name: load_balancer
            label: Load Balancer
            description: Load Balancer part of a Fabric.
            color: "#38e7fb"
          - name: edge_firewall
            label: Edge Firewall
            description: "Security boundary with external network"
            color: "#6a5acd"
      - name: cpu
        label: CPU Number
        kind: Number
        optional: true
        order_weight: 2000
      - name: memory
        label: Memory Size (GB)
        kind: Number
        optional: true
        order_weight: 2100
      - name: storage
        label: Storage Size (GB)
        kind: Number
        optional: true
        order_weight: 2200
    relationships:
      - name: device_type
        peer: DcimDeviceType
        optional: true
        cardinality: one
        kind: Attribute
        order_weight: 1200
      - name: hosting_device
        peer: DcimDevice
        kind: Attribute
        cardinality: one
        optional: true
